<!-- ... Keep your existing Head, Styles, and Sidebar exactly as they are ... -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TurboTech Pro | SaaS CRM</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Use your existing CSS here -->
  <style>
    /* ... YOUR EXISTING CSS (UNCHANGED) ... */
    :root {
      --primary: #2563eb; --primary-hover: #1d4ed8; --bg-slate: #f8fafc; --sidebar: #0f172a;
      --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --white: #ffffff;
      --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-slate); color: var(--text-main); }
    #loginPage { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; }
    .login-card { background: var(--white); padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
    .google-btn { width: 100%; padding: 14px; border-radius: var(--radius); border: 1px solid var(--border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 600; font-family: inherit; transition: 0.2s; }
    #mainApp { display: none; }
    .app-container { display: flex; min-height: 100vh; }
    aside { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; transition: 0.3s; }
    .sidebar-brand { padding: 30px 24px; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.2rem; }
    .nav-list { flex: 1; padding: 10px 16px; list-style: none; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #94a3b8; border-radius: 10px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; }
    .nav-item.active { background: var(--primary); color: white; }
    main { margin-left: 260px; flex: 1; padding: 40px; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; gap: 20px; }
    .search-box { position: relative; flex: 1; max-width: 400px; }
    .search-box input { width: 100%; padding: 12px 16px 12px 45px; border-radius: 12px; border: 1px solid var(--border); outline: none; }
    .search-box i { position: absolute; left: 16px; top: 12px; color: var(--text-muted); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--primary); }
    .card-ui { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background: #f8fafc; padding: 16px; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }
    .badge-yes { background: #dcfce7; color: #15803d; }
    .badge-no { background: #fee2e2; color: #b91c1c; }
    .badge-pending { background: #fef3c7; color: #b45309; }
    .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-icon { padding: 8px; background: transparent; color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; width: 100%; max-width: 600px; border-radius: 20px; padding: 32px; max-height: 90vh; overflow-y: auto; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: span 2; }
    @media (max-width: 1024px) { aside { transform: translateX(-100%); } main { margin-left: 0; } }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div id="loginPage">
    <div class="login-card">
      <i data-lucide="zap" style="color:var(--primary); width:48px; height:48px; margin-bottom:16px;"></i>
      <h2>TurboTech Tracker</h2>
      <button class="google-btn" onclick="googleLogin()">Sign in with Google</button>
    </div>
  </div>

  <div id="mainApp">
    <div class="app-container">
      <aside id="sidebar">
        <div class="sidebar-brand"><i data-lucide="zap" style="color:var(--primary)"></i> TurboTech</div>
        <ul class="nav-list">
          <li class="nav-item active" onclick="switchView('leads')"><i data-lucide="layout-dashboard"></i> <span>Leads</span></li>
          <li class="nav-item" onclick="switchView('trash')"><i data-lucide="trash-2"></i> <span>Trash</span></li>
        </ul>
        <div class="logout-area" style="padding: 20px;"><button class="btn btn-outline" onclick="logoutUser()" style="width:100%">Logout</button></div>
      </aside>

      <main>
        <header class="header-row">
          <div class="search-box">
            <i data-lucide="search"></i>
            <input type="text" id="searchInput" placeholder="Search name, phone, response or notes..." oninput="renderTable()">
          </div>
          <button class="btn btn-primary" onclick="openModal()"><i data-lucide="plus"></i> New Lead</button>
        </header>

        <!-- DASHBOARD CARDS (CLICKABLE) -->
        <section class="stats-grid" id="statsContainer">
          <div class="stat-card" onclick="setFilter('all')">
            <small>Active Leads</small>
            <h3 id="statTotal">0</h3>
          </div>
          <div class="stat-card" onclick="setFilter('Yes')">
            <small>Interested</small>
            <h3 id="statYes" style="color:var(--success)">0</h3>
          </div>
          <div class="stat-card" onclick="setFilter('Pending')">
            <small>Pending</small>
            <h3 id="statPending" style="color:var(--warning)">0</h3>
          </div>
        </section>

        <h2 id="viewTitle" style="margin-bottom: 20px;">All Leads</h2>

        <div class="card-ui">
          <table>
            <thead>
              <tr>
                <th>Lead Info</th>
                <th>Status</th>
                <th>Communication</th>
                <th>Follow-up</th>
                <th style="text-align: right;">Action</th>
              </tr>
            </thead>
            <tbody id="leadsBody"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- Lead Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalHeader">Add New Lead</h2>
      <form id="leadForm">
        <input type="hidden" id="leadId">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Business Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label>Phone 1 (Primary)</label>
            <input type="tel" id="phone" placeholder="+91...">
          </div>
          <div class="form-group">
            <label>Phone 2 (Optional)</label>
            <input type="tel" id="phone2" placeholder="+91...">
          </div>
          <div class="form-group">
            <label>Contacted?</label>
            <select id="contacted"><option value="no">No</option><option value="yes">Yes</option></select>
          </div>
          <div class="form-group">
            <label>Response</label>
            <select id="response"><option value="Pending">Pending</option><option value="Yes">Yes</option><option value="No">No</option></select>
          </div>
          <div class="form-group"><label>Contacted On</label><input type="date" id="contactedOn"></div>
          <div class="form-group"><label>Follow-up Date</label><input type="date" id="followup"></div>
          <div class="form-group full-width"><label>Notes</label><textarea id="notes" rows="3"></textarea></div>
        </div>
        <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 12px;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Lead</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // --- CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDsM9-jrnVjV9x8vZF42ayIuMspf1nhEbs",
      authDomain: "turbotech-tracker.firebaseapp.com",
      projectId: "turbotech-tracker",
      storageBucket: "turbotech-tracker.firebasestorage.app",
      messagingSenderId: "563685474940",
      appId: "1:563685474940:web:61b8278c8e70b7286dbff9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();
    const leadsRef = collection(db, "leads");

    let leads = [];
    let currentView = 'leads';
    let statusFilter = 'all'; // Filter from Dashboard cards

    // --- AUTH ---
    window.googleLogin = async () => { try { await signInWithPopup(auth, provider); } catch (e) { alert("Login failed"); } };
    onAuthStateChanged(auth, (user) => {
      if (user && user.email === "YOUR_EMAIL@gmail.com") { // Replace with your email
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        initApp();
      } else {
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("mainApp").style.display = "none";
      }
    });
    window.logoutUser = () => signOut(auth);

    // --- APP LOGIC ---
    function initApp() {
      const q = query(leadsRef, orderBy("name", "asc"));
      onSnapshot(q, (snapshot) => {
        leads = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTable();
      });
    }

    // DASHBOARD CARD FILTER LOGIC
    window.setFilter = (status) => {
      statusFilter = status;
      document.getElementById('viewTitle').innerText = status === 'all' ? 'All Leads' : `${status} Leads`;
      renderTable();
    };

    // SEARCH & RENDER LOGIC
    window.renderTable = () => {
      const tbody = document.getElementById('leadsBody');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = leads.filter(l => {
        const matchesView = currentView === 'leads' ? !l.deleted : l.deleted;
        // Dashboard status filter
        const matchesStatus = statusFilter === 'all' || l.response === statusFilter;
        // Real-time search filter (Name, Phone1, Phone2, Response, Notes)
        const matchesSearch = 
            l.name.toLowerCase().includes(search) || 
            (l.phone && l.phone.includes(search)) ||
            (l.phone2 && l.phone2.includes(search)) ||
            l.response.toLowerCase().includes(search) ||
            (l.notes && l.notes.toLowerCase().includes(search));

        return matchesView && matchesStatus && matchesSearch;
      });

      tbody.innerHTML = filtered.map(l => `
        <tr>
          <td><strong>${l.name}</strong></td>
          <td><span class="badge badge-${l.response.toLowerCase()}">${l.response}</span></td>
          <td>
            <div style="display:flex; gap:8px;">
               ${l.phone ? `<a href="tel:${l.phone}" class="btn-icon" title="Call Primary"><i data-lucide="phone"></i></a>` : ''}
               ${l.phone ? `<a href="https://wa.me/${l.phone.replace(/\D/g,'')}" target="_blank" class="btn-icon" title="WhatsApp"><i data-lucide="message-circle"></i></a>` : ''}
               ${l.phone2 ? `<a href="tel:${l.phone2}" class="btn-icon" style="opacity:0.6" title="Call Secondary"><i data-lucide="phone-forwarded"></i></a>` : ''}
            </div>
          </td>
          <td>${l.followup || '—'}</td>
          <td style="text-align: right;">
            ${!l.deleted ? `
              <button class="btn-icon" onclick="editLead('${l.id}')"><i data-lucide="edit-3"></i></button>
              <button class="btn-icon" onclick="softDelete('${l.id}')"><i data-lucide="trash-2"></i></button>
            ` : `
              <button class="btn btn-primary" style="padding:5px 10px; font-size:12px; background:var(--success)" onclick="restoreLead('${l.id}')">Restore</button>
              <button class="btn btn-primary" style="padding:5px 10px; font-size:12px; background:var(--danger)" onclick="permanentDelete('${l.id}')">Delete Forever</button>
            `}
          </td>
        </tr>
      `).join('');
      
      updateStats();
      lucide.createIcons();
    };

    function updateStats() {
      const active = leads.filter(l => !l.deleted);
      document.getElementById('statTotal').innerText = active.length;
      document.getElementById('statYes').innerText = active.filter(l => l.response === 'Yes').length;
      document.getElementById('statPending').innerText = active.filter(l => l.response === 'Pending').length;
    }

    // --- BUTTON ACTIONS ---
    window.softDelete = async (id) => { if(confirm("Move to Trash?")) await updateDoc(doc(db, "leads", id), { deleted: true, deletedAt: Date.now() }); };
    
    window.restoreLead = async (id) => await updateDoc(doc(db, "leads", id), { deleted: false, deletedAt: null });

    // NEW: PERMANENT DELETE FUNCTION
    window.permanentDelete = async (id) => {
      if(confirm("This action is permanent and cannot be undone. Delete forever?")) {
        await deleteDoc(doc(db, "leads", id));
      }
    };

    window.switchView = (view) => {
      currentView = view;
      statusFilter = 'all'; // Reset status filter when switching pages
      document.getElementById('viewTitle').innerText = view === 'leads' ? 'All Leads' : 'Trash Storage';
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
      renderTable();
    };

    window.openModal = () => {
      document.getElementById('leadForm').reset();
      document.getElementById('leadId').value = '';
      document.getElementById('modalOverlay').classList.add('open');
    };

    window.closeModal = () => document.getElementById('modalOverlay').classList.remove('open');

    window.editLead = (id) => {
      const l = leads.find(lead => lead.id === id);
      document.getElementById('leadId').value = l.id;
      document.getElementById('name').value = l.name;
      document.getElementById('phone').value = l.phone || '';
      document.getElementById('phone2').value = l.phone2 || ''; // Phone 2 support
      document.getElementById('contacted').value = l.contacted;
      document.getElementById('response').value = l.response;
      document.getElementById('contactedOn').value = l.contactedOn || '';
      document.getElementById('followup').value = l.followup || '';
      document.getElementById('notes').value = l.notes || '';
      document.getElementById('modalOverlay').classList.add('open');
    };

    document.getElementById('leadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('leadId').value;
      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        phone2: document.getElementById('phone2').value, // Phone 2 support
        contacted: document.getElementById('contacted').value,
        response: document.getElementById('response').value,
        contactedOn: document.getElementById('contactedOn').value,
        followup: document.getElementById('followup').value,
        notes: document.getElementById('notes').value,
        deleted: false
      };
      if(id) await updateDoc(doc(db, "leads", id), data);
      else { data.createdAt = Date.now(); await addDoc(leadsRef, data); }
      closeModal();
    });

    lucide.createIcons();
  </script>
</body>
</html>
