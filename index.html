<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TurboTech Pro | SaaS CRM</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --bg-slate: #f8fafc;
      --sidebar: #0f172a;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --white: #ffffff;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --radius: 16px;
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-slate); color: var(--text-main); overflow-x: hidden; }

    /* --- SKELETON LOADING --- */
    .skeleton { background: #e2e8f0; background: linear-gradient(110deg, #eceff1 8%, #f5f7f8 18%, #eceff1 33%); border-radius: 12px; background-size: 200% 100%; animation: 1.5s shine linear infinite; }
    @keyframes shine { to { background-position-x: -200%; } }
    .skeleton-card { height: 100px; width: 100%; margin-bottom: 15px; }

    /* --- AUTH PAGE --- */
    #loginPage { height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; padding: 20px; }
    .login-card { background: var(--white); padding: 40px; border-radius: 24px; text-align: center; width: 100%; max-width: 400px; animation: fadeInUp 0.5s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* --- MOBILE NAV BAR --- */
    .mobile-top-bar { display: none; position: fixed; top: 0; left: 0; right: 0; height: 64px; background: var(--white); border-bottom: 1px solid var(--border); z-index: 100; padding: 0 20px; align-items: center; justify-content: space-between; }
    
    /* --- SIDEBAR --- */
    aside { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 200; transition: var(--transition); }
    .sidebar-brand { padding: 32px 24px; display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.25rem; }
    .nav-list { flex: 1; padding: 0 16px; list-style: none; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #94a3b8; border-radius: 12px; cursor: pointer; transition: var(--transition); margin-bottom: 4px; }
    .nav-item.active { background: var(--primary); color: white; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 150; }

    /* --- SEARCH EXPERIENCE (Instagram Style) --- */
    .search-wrapper { position: relative; transition: var(--transition); z-index: 300; }
    .search-box { position: relative; flex: 1; }
    .search-box input { width: 100%; padding: 14px 16px 14px 48px; border-radius: 14px; border: 1px solid var(--border); outline: none; background: white; transition: var(--transition); }
    .search-box i { position: absolute; left: 18px; top: 15px; color: var(--text-muted); pointer-events: none; }
    
    .search-focused { position: fixed; inset: 0; background: var(--bg-slate); padding: 20px; z-index: 400; display: none; flex-direction: column; overflow-y: auto; }
    .search-focused.active { display: flex; }
    .close-search { display: none; padding: 10px; color: var(--primary); font-weight: 700; cursor: pointer; }

    /* --- MAIN LAYOUT --- */
    main { margin-left: 260px; padding: 40px; transition: var(--transition); }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; gap: 20px; }

    /* --- STATS GRID --- */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--primary); }
    .stat-card small { color: var(--text-muted); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }
    .stat-card h3 { font-size: 1.5rem; margin-top: 4px; }

    /* --- TABLE UI --- */
    .card-ui { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 16px 24px; font-size: 0.75rem; color: var(--text-muted); text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 18px 24px; border-bottom: 1px solid var(--border); vertical-align: middle; }

    .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
    .badge-yes { background: #ecfdf5; color: #10b981; }
    .badge-no { background: #fef2f2; color: #ef4444; }
    .badge-pending { background: #fffbeb; color: #f59e0b; }

    .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-icon { padding: 10px; color: var(--text-muted); border-radius: 10px; transition: var(--transition); }
    .btn-icon:hover { background: var(--primary-soft); color: var(--primary); }

    /* --- MODAL (EDIT PAGE) --- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; width: 100%; max-width: 600px; border-radius: 28px; padding: 32px; max-height: 90vh; overflow-y: auto; animation: modalSlide 0.4s ease; }
    @keyframes modalSlide { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }
    .form-group input, .form-group select, .form-group textarea { padding: 14px; border: 1px solid var(--border); border-radius: 12px; outline: none; font-family: inherit; font-size: 0.95rem; transition: var(--transition); }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }
    .full-width { grid-column: span 2; }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 1024px) {
        aside { transform: translateX(-100%); }
        aside.open { transform: translateX(0); }
        .sidebar-overlay.open { display: block; }
        .mobile-top-bar { display: flex; }
        main { margin-left: 0; padding: 84px 16px 24px 16px; }
        .header-row { flex-direction: column; align-items: stretch; margin-top: 10px; }
        .search-box input:focus { position: relative; }
        .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
        .form-grid { grid-template-columns: 1fr; }
        .full-width { grid-column: span 1; }
        .modal { padding: 24px; border-radius: 24px; }
        .modal button { width: 100%; justify-content: center; }
        
        thead { display: none; }
        tr { display: block; background: white; border: 1px solid var(--border); border-radius: 20px; margin-bottom: 16px; padding: 16px; }
        td { display: flex; justify-content: space-between; border: none; padding: 8px 0; font-size: 0.9rem; }
        td::before { content: attr(data-label); font-weight: 700; color: var(--text-muted); }
        td:first-child { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 8px; font-weight: 800; color: var(--primary); }
        td:first-child::before { display: none; }
        td:last-child { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 8px; justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <!-- MOBILE HEADER -->
  <nav class="mobile-top-bar">
    <button class="btn-icon" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
    <div style="font-weight: 800; color: var(--primary); display:flex; align-items:center; gap:8px;"><i data-lucide="zap"></i> TurboTech</div>
    <div style="width: 40px;"></div>
  </nav>

  <div id="loginPage">
    <div class="login-card">
        <i data-lucide="zap" style="color:var(--primary); width:48px; height:48px; margin-bottom:16px;"></i>
        <h2 style="margin-bottom: 24px;">TurboTech Tracker</h2>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="googleLogin()">Sign in with Google</button>
    </div>
  </div>

  <div id="mainApp">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <aside id="sidebar">
        <div class="sidebar-brand"><i data-lucide="zap" style="color:var(--primary); fill:var(--primary)"></i> TurboTech</div>
        <ul class="nav-list">
          <li class="nav-item active" id="nav-leads" onclick="switchView('leads'); toggleSidebar(false)"><i data-lucide="layout-dashboard"></i> <span>Pipeline</span></li>
          <li class="nav-item" id="nav-trash" onclick="switchView('trash'); toggleSidebar(false)"><i data-lucide="trash-2"></i> <span>Trash Bin</span></li>
        </ul>
        <div class="logout-area" style="padding:20px 16px;"><button class="btn" style="width:100%; background:rgba(255,255,255,0.1); color:white;" onclick="logoutUser()">Logout</button></div>
    </aside>

    <main>
      <header class="header-row" id="mainHeader">
        <div class="search-box">
          <i data-lucide="search"></i>
          <input type="text" id="searchInput" placeholder="Search by name, phone or notes..." onfocus="enterSearchMode()" oninput="renderTable()">
        </div>
        <button class="btn btn-primary" onclick="openModal()"><i data-lucide="plus"></i> New Lead</button>
      </header>

      <!-- SEARCH MODE OVERLAY -->
      <div id="searchOverlay" class="search-focused">
          <div style="display:flex; align-items:center; gap:15px; margin-bottom: 20px;">
              <button class="btn-icon" onclick="exitSearchMode()"><i data-lucide="arrow-left"></i></button>
              <div class="search-box" style="flex:1">
                  <i data-lucide="search"></i>
                  <input type="text" id="focusedSearchInput" placeholder="Type to search..." oninput="syncSearch(this)">
              </div>
          </div>
          <div id="searchResults"></div>
      </div>

      <section class="stats-grid" id="statsContainer">
        <!-- Dashboard cards are auto-updated by JS -->
      </section>

      <div id="loadingState" style="display:none;">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
      </div>

      <div class="card-ui" id="tableContainer">
        <table>
          <thead>
            <tr>
              <th>Lead Info</th>
              <th>Status</th>
              <th>Response</th>
              <th>Connect</th>
              <th>Follow-up</th>
              <th style="text-align: right;">Action</th>
            </tr>
          </thead>
          <tbody id="leadsBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalHeader" style="margin-bottom:8px;">Lead Intelligence</h2>
      <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:24px;">Update all business data points below.</p>
      <form id="leadForm">
        <input type="hidden" id="leadId">
        <div class="form-grid">
          <div class="form-group full-width"><label>Business Name</label><input type="text" id="name" required></div>
          <div class="form-group"><label>Primary Phone</label><input type="tel" id="phone"></div>
          <div class="form-group"><label>Secondary Phone</label><input type="tel" id="phone2"></div>
          <div class="form-group"><label>Contacted?</label><select id="contacted"><option value="no">Not Called</option><option value="yes">Called</option></select></div>
          <div class="form-group"><label>Response</label><select id="response"><option value="Pending">Pending</option><option value="Yes">Interested</option><option value="No">Not Interested</option></select></div>
          <div class="form-group"><label>Follow-up Date</label><input type="date" id="followup"></div>
          <div class="form-group"><label>Maps Link</label><input type="url" id="mapsLink" placeholder="https://goo.gl/maps/..."></div>
          <div class="form-group full-width"><label>Internal Notes</label><textarea id="notes" rows="3"></textarea></div>
        </div>
        <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 12px;">
          <button type="button" class="btn" style="background:#f1f5f9;" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDsM9-jrnVjV9x8vZF42ayIuMspf1nhEbs",
      authDomain: "turbotech-tracker.firebaseapp.com",
      projectId: "turbotech-tracker",
      storageBucket: "turbotech-tracker.firebasestorage.app",
      messagingSenderId: "563685474940",
      appId: "1:563685474940:web:61b8278c8e70b7286dbff9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const leadsRef = collection(db, "leads");

    let leads = [];
    let currentView = 'leads';
    let dashFilter = 'all';
    let isLoading = true;

    // --- AUTH ---
    window.googleLogin = () => signInWithPopup(auth, provider);
    window.logoutUser = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      const lp = document.getElementById("loginPage");
      const ma = document.getElementById("mainApp");
      if (user && user.email === "ganesh.r20087@gmail.com") {
        lp.style.display = "none"; ma.style.display = "block"; initApp();
      } else {
        lp.style.display = "flex"; ma.style.display = "none";
      }
    });

    // --- SIDEBAR & SEARCH UX ---
    window.toggleSidebar = (force) => {
        const side = document.getElementById('sidebar');
        const over = document.getElementById('sidebarOverlay');
        const isOpen = force !== undefined ? force : !side.classList.contains('open');
        side.classList.toggle('open', isOpen);
        over.classList.toggle('open', isOpen);
    };

    window.enterSearchMode = () => {
        if(window.innerWidth > 1024) return;
        document.getElementById('searchOverlay').classList.add('active');
        document.getElementById('focusedSearchInput').focus();
    };

    window.exitSearchMode = () => {
        document.getElementById('searchOverlay').classList.remove('active');
        document.getElementById('searchInput').value = '';
        renderTable();
    };

    window.syncSearch = (el) => {
        document.getElementById('searchInput').value = el.value;
        renderTable();
    };

    // --- APP LOGIC ---
    function initApp() {
      document.getElementById('loadingState').style.display = 'block';
      const q = query(leadsRef, orderBy("name", "asc"));
      onSnapshot(q, (snapshot) => {
        leads = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        isLoading = false;
        document.getElementById('loadingState').style.display = 'none';
        renderTable();
      });
    }

    window.switchView = (view) => {
      currentView = view;
      document.getElementById('nav-leads').classList.toggle('active', view === 'leads');
      document.getElementById('nav-trash').classList.toggle('active', view === 'trash');
      renderTable();
    };

    window.renderTable = () => {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = leads.filter(l => {
        const matchesView = currentView === 'leads' ? !l.deleted : l.deleted;
        const matchesSearch = l.name.toLowerCase().includes(search) || (l.phone && l.phone.includes(search)) || (l.notes && l.notes.toLowerCase().includes(search));
        return matchesView && matchesSearch;
      });

      const container = document.getElementById('leadsBody');
      const searchResults = document.getElementById('searchResults');

      if (filtered.length === 0 && search) {
          const emptyHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted)">No results for "${search}"</div>`;
          container.innerHTML = emptyHTML;
          searchResults.innerHTML = emptyHTML;
          return;
      }

      const rows = filtered.map(l => {
        const wa = l.phone ? l.phone.replace(/\D/g,'') : '';
        return `
        <tr>
          <td data-label="Business"><strong>${l.name}</strong></td>
          <td data-label="Status"><span class="badge badge-${l.contacted === 'yes' ? 'yes' : 'no'}">${l.contacted === 'yes' ? 'Called' : 'Not Called'}</span></td>
          <td data-label="Response"><span class="badge badge-${l.response.toLowerCase()}">${l.response}</span></td>
          <td data-label="Connect">
            <div style="display:flex; gap:8px;">
               ${l.phone ? `<a href="tel:${l.phone}" class="btn-icon"><i data-lucide="phone" size="18"></i></a>` : ''}
               ${l.phone ? `<a href="https://wa.me/${wa}" target="_blank" class="btn-icon"><i data-lucide="message-circle" size="18"></i></a>` : ''}
               ${l.mapsLink ? `<a href="${l.mapsLink}" target="_blank" class="btn-icon" style="color:var(--success)"><i data-lucide="map-pin" size="18"></i></a>` : ''}
            </div>
          </td>
          <td data-label="Follow-up">${l.followup || '—'}</td>
          <td style="text-align:right;">
            <button class="btn-icon" onclick="editLead('${l.id}')"><i data-lucide="edit-3" size="18"></i></button>
            <button class="btn-icon" onclick="softDelete('${l.id}')"><i data-lucide="trash-2" size="18"></i></button>
          </td>
        </tr>`;
      }).join('');

      container.innerHTML = rows;
      searchResults.innerHTML = rows; // Sync search overlay
      updateDashboard();
      lucide.createIcons();
    };

    function updateDashboard() {
        const active = leads.filter(l => !l.deleted);
        const stats = [
            { label: 'Total', val: active.length, icon: 'users', color: 'var(--primary)' },
            { label: 'Interested', val: active.filter(l => l.response === 'Yes').length, icon: 'smile', color: 'var(--success)' },
            { label: 'Pending', val: active.filter(l => l.response === 'Pending').length, icon: 'clock', color: 'var(--warning)' },
            { label: 'Contacted', val: active.filter(l => l.contacted === 'yes').length, icon: 'phone-call', color: 'var(--primary)' }
        ];
        document.getElementById('statsContainer').innerHTML = stats.map(s => `
            <div class="stat-card">
                <small>${s.label}</small>
                <h3 style="color:${s.color}">${s.val}</h3>
                <i data-lucide="${s.icon}" style="position:absolute; right:15px; bottom:15px; opacity:0.1" size="32"></i>
            </div>
        `).join('');
    }

    // --- FORM ACTIONS ---
    window.openModal = () => { 
        document.getElementById('leadForm').reset(); 
        document.getElementById('leadId').value = '';
        document.getElementById('modalOverlay').classList.add('open'); 
    };
    window.closeModal = () => document.getElementById('modalOverlay').classList.remove('open');

    window.editLead = (id) => {
        const l = leads.find(x => x.id === id);
        document.getElementById('leadId').value = l.id;
        document.getElementById('name').value = l.name;
        document.getElementById('phone').value = l.phone || '';
        document.getElementById('phone2').value = l.phone2 || '';
        document.getElementById('contacted').value = l.contacted;
        document.getElementById('response').value = l.response;
        document.getElementById('followup').value = l.followup || '';
        document.getElementById('mapsLink').value = l.mapsLink || '';
        document.getElementById('notes').value = l.notes || '';
        document.getElementById('modalOverlay').classList.add('open');
    };

    document.getElementById('leadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('leadId').value;
        const data = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            phone2: document.getElementById('phone2').value,
            contacted: document.getElementById('contacted').value,
            response: document.getElementById('response').value,
            followup: document.getElementById('followup').value,
            mapsLink: document.getElementById('mapsLink').value,
            notes: document.getElementById('notes').value,
            deleted: false
        };
        id ? await updateDoc(doc(db, "leads", id), data) : await addDoc(leadsRef, { ...data, createdAt: Date.now() });
        closeModal();
    });

    window.softDelete = async (id) => { if(confirm("Move to trash?")) await updateDoc(doc(db, "leads", id), { deleted: true }); };

    lucide.createIcons();
  </script>
</body>
</html>
