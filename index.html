<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TurboTech Pro | SaaS CRM</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-slate: #f8fafc;
      --sidebar: #0f172a;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --white: #ffffff;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-slate); color: var(--text-main); }

    /* --- LOGIN PAGE --- */
    #loginPage {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px;
    }
    .login-card {
      background: var(--white); padding: 40px; border-radius: 24px; text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
    }
    .login-card h2 { margin-bottom: 10px; font-size: 1.8rem; }
    .login-card p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem; }
    .google-btn {
      width: 100%; padding: 14px; border-radius: var(--radius); border: 1px solid var(--border);
      background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 12px; font-weight: 600; font-family: inherit; transition: 0.2s;
    }
    .google-btn:hover { background: #f1f5f9; transform: translateY(-1px); }

    /* --- APP LAYOUT --- */
    #mainApp { display: none; }
    .app-container { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    aside {
      width: 260px; background: var(--sidebar); color: white;
      display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; transition: 0.3s;
    }
    .sidebar-brand { padding: 30px 24px; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.2rem; }
    .nav-list { flex: 1; padding: 10px 16px; list-style: none; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      color: #94a3b8; border-radius: 10px; cursor: pointer; transition: 0.2s; margin-bottom: 4px;
    }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
    .nav-item.active { background: var(--primary); color: white; }
    .logout-area { padding: 20px 16px; border-top: 1px solid rgba(255,255,255,0.1); }

    /* CONTENT */
    main { margin-left: 260px; flex: 1; padding: 40px; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; gap: 20px; }
    .search-box { position: relative; flex: 1; max-width: 400px; }
    .search-box input {
      width: 100%; padding: 12px 16px 12px 45px; border-radius: 12px; border: 1px solid var(--border); outline: none;
    }
    .search-box i { position: absolute; left: 16px; top: 12px; color: var(--text-muted); }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .stat-card small { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
    .stat-card h3 { font-size: 1.8rem; margin-top: 8px; }

    /* TABLE */
    .card-ui { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background: #f8fafc; padding: 16px; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    tr:last-child td { border-bottom: none; }
    
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }
    .badge-yes { background: #dcfce7; color: #15803d; }
    .badge-no { background: #fee2e2; color: #b91c1c; }
    .badge-pending { background: #fef3c7; color: #b45309; }

    /* BUTTONS */
    .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: inherit; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-outline { background: white; border: 1px solid var(--border); }
    .btn-icon { padding: 8px; background: transparent; color: var(--text-muted); }
    .btn-icon:hover { color: var(--primary); background: #f1f5f9; border-radius: 6px; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal { background: white; width: 100%; max-width: 600px; border-radius: 20px; padding: 32px; max-height: 90vh; overflow-y: auto; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    .form-group input, .form-group select, .form-group textarea { padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; }
    .full-width { grid-column: span 2; }

    /* --- MOBILE RESPONSIVE --- */
    @media (max-width: 1024px) {
      aside { transform: translateX(-100%); }
      aside.open { transform: translateX(0); }
      main { margin-left: 0; padding: 20px; }
      .header-row { flex-direction: column; align-items: stretch; }
      
      /* Table to Cards for Mobile */
      thead { display: none; }
      tr { display: block; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 16px; padding: 10px; }
      td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 8px 12px; }
      td::before { content: attr(data-label); font-weight: 700; color: var(--text-muted); font-size: 0.8rem; }
      td:first-child { background: #f8fafc; border-radius: 10px; margin-bottom: 8px; }
      td:last-child { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 15px; }
    }

    #menuToggle { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: var(--primary); color: white; width: 56px; height: 56px; border-radius: 50%; justify-content: center; align-items: center; box-shadow: 0 10px 15px -3px rgba(37,99,235,0.4); border: none; }
    @media (max-width: 1024px) { #menuToggle { display: flex; } }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div id="loginPage">
    <div class="login-card">
      <i data-lucide="zap" style="color:var(--primary); width:48px; height:48px; margin-bottom:16px;"></i>
      <h2>TurboTech Tracker</h2>
      <p>Secure Outreach Management for Professionals</p>
      <button class="google-btn" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- Main Application -->
  <div id="mainApp">
    <div class="app-container">
      <button id="menuToggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i data-lucide="menu"></i></button>
      
      <aside id="sidebar">
        <div class="sidebar-brand">
          <i data-lucide="zap" style="color:var(--primary)"></i> TurboTech
        </div>
        <ul class="nav-list">
          <li class="nav-item active" onclick="switchView('leads')">
            <i data-lucide="layout-dashboard"></i> <span>Leads</span>
          </li>
          <li class="nav-item" onclick="switchView('trash')">
            <i data-lucide="trash-2"></i> <span>Trash</span>
          </li>
          <li class="nav-item" onclick="alert('Coming soon!')">
            <i data-lucide="settings"></i> <span>Settings</span>
          </li>
        </ul>
        <div class="logout-area">
          <button class="btn btn-outline" onclick="logoutUser()" style="width:100%">
            <i data-lucide="log-out"></i> Logout
          </button>
        </div>
      </aside>

      <main>
        <header class="header-row">
          <div class="search-box">
            <i data-lucide="search"></i>
            <input type="text" id="searchInput" placeholder="Search name or phone..." oninput="renderTable()">
          </div>
          <button class="btn btn-primary" onclick="openModal()">
            <i data-lucide="plus"></i> New Lead
          </button>
        </header>

        <section class="stats-grid" id="statsContainer">
          <div class="stat-card">
            <small>Active Leads</small>
            <h3 id="statTotal">0</h3>
          </div>
          <div class="stat-card">
            <small>Interested</small>
            <h3 id="statYes" style="color:var(--success)">0</h3>
          </div>
          <div class="stat-card">
            <small>Pending</small>
            <h3 id="statPending" style="color:var(--warning)">0</h3>
          </div>
        </section>

        <h2 id="viewTitle" style="margin-bottom: 20px;">All Leads</h2>

        <div class="card-ui">
          <table>
            <thead>
              <tr>
                <th>Lead Info</th>
                <th>Status</th>
                <th>Phone</th>
                <th>Follow-up</th>
                <th style="text-align: right;">Action</th>
              </tr>
            </thead>
            <tbody id="leadsBody">
              <!-- Content generated by JS -->
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- Lead Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalHeader">Add New Lead</h2>
      <form id="leadForm">
        <input type="hidden" id="leadId">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Business Name</label>
            <input type="text" id="name" required placeholder="e.g. Skyline Academy">
          </div>
          <div class="form-group">
            <label>Contacted?</label>
            <select id="contacted">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </div>
          <div class="form-group">
            <label>Response</label>
            <select id="response">
              <option value="Pending">Pending</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+91...">
          </div>
          <div class="form-group">
            <label>Contacted On</label>
            <input type="date" id="contactedOn">
          </div>
          <div class="form-group">
            <label>Follow-up Date</label>
            <input type="date" id="followup">
          </div>
          <div class="form-group">
            <label>Recurring Type</label>
            <input type="text" id="recurringType" placeholder="Monthly / Annual">
          </div>
          <div class="form-group">
            <label>Recurring Date</label>
            <input type="date" id="recurringDate">
          </div>
          <div class="form-group full-width">
            <label>Notes</label>
            <textarea id="notes" rows="3"></textarea>
          </div>
        </div>
        <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 12px;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Intelligence</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDsM9-jrnVjV9x8vZF42ayIuMspf1nhEbs",
      authDomain: "turbotech-tracker.firebaseapp.com",
      projectId: "turbotech-tracker",
      storageBucket: "turbotech-tracker.firebasestorage.app",
      messagingSenderId: "563685474940",
      appId: "1:563685474940:web:61b8278c8e70b7286dbff9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();
    const leadsRef = collection(db, "leads");

    let leads = [];
    let currentView = 'leads';

    // --- AUTHENTICATION ---
    window.googleLogin = async function() {
      try { await signInWithPopup(auth, provider); } 
      catch (error) { alert("Login failed ❌"); }
    };

    onAuthStateChanged(auth, (user) => {
      // !!! REPLACE THE EMAIL BELOW WITH YOUR REAL GMAIL !!!
      if (user && user.email === "ganesh.r20087@gmail.com") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        initApp();
      } else {
        if(user) { alert("Unauthorized User"); signOut(auth); }
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("mainApp").style.display = "none";
      }
    });

    window.logoutUser = () => signOut(auth);

    // --- CORE LOGIC ---
    function initApp() {
      const q = query(leadsRef, orderBy("name", "asc"));
      onSnapshot(q, (snapshot) => {
        leads = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        autoPurgeTrash(); // Clean old trash items
        renderTable();
      });
    }

    function renderTable() {
      const tbody = document.getElementById('leadsBody');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = leads.filter(l => {
        const matchesSearch = l.name.toLowerCase().includes(search) || (l.phone && l.phone.includes(search));
        const matchesView = currentView === 'leads' ? !l.deleted : l.deleted;
        return matchesSearch && matchesView;
      });

      tbody.innerHTML = filtered.map(l => `
        <tr>
          <td data-label="Business"><strong>${l.name}</strong></td>
          <td data-label="Status"><span class="badge badge-${l.response.toLowerCase()}">${l.response}</span></td>
          <td data-label="Phone">${l.phone || '—'}</td>
          <td data-label="Follow-up">${l.followup || '—'}</td>
          <td style="text-align: right;">
            ${!l.deleted ? 
              `<button class="btn-icon" onclick="editLead('${l.id}')"><i data-lucide="edit-3"></i></button>
               <button class="btn-icon" onclick="softDelete('${l.id}')"><i data-lucide="trash-2"></i></button>` :
              `<button class="btn btn-primary" style="padding:5px 10px; font-size:12px" onclick="restoreLead('${l.id}')">Restore</button>`
            }
          </td>
        </tr>
      `).join('');
      
      updateStats();
      lucide.createIcons();
    }

    function updateStats() {
      const active = leads.filter(l => !l.deleted);
      document.getElementById('statTotal').innerText = active.length;
      document.getElementById('statYes').innerText = active.filter(l => l.response === 'Yes').length;
      document.getElementById('statPending').innerText = active.filter(l => l.response === 'Pending').length;
    }

    // --- TRASH SYSTEM ---
    window.softDelete = async (id) => {
      if(confirm("Move to Trash?")) {
        await updateDoc(doc(db, "leads", id), { deleted: true, deletedAt: Date.now() });
      }
    };

    window.restoreLead = async (id) => {
      await updateDoc(doc(db, "leads", id), { deleted: false, deletedAt: null });
    };

    async function autoPurgeTrash() {
      const fifteenDaysMs = 15 * 24 * 60 * 60 * 1000;
      const now = Date.now();
      leads.forEach(async (l) => {
        if(l.deleted && l.deletedAt && (now - l.deletedAt > fifteenDaysMs)) {
          await deleteDoc(doc(db, "leads", l.id));
        }
      });
    }

    window.switchView = (view) => {
      currentView = view;
      document.getElementById('viewTitle').innerText = view === 'leads' ? 'Active Leads' : 'Trash (Auto-deleted after 15 days)';
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.getElementById('statsContainer').style.display = view === 'leads' ? 'grid' : 'none';
      if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('open');
      renderTable();
    };

    // --- FORM LOGIC ---
    window.openModal = () => {
      document.getElementById('leadForm').reset();
      document.getElementById('leadId').value = '';
      document.getElementById('modalHeader').innerText = "Capture New Lead";
      document.getElementById('modalOverlay').classList.add('open');
    };

    window.closeModal = () => document.getElementById('modalOverlay').classList.remove('open');

    window.editLead = (id) => {
      const l = leads.find(lead => lead.id === id);
      document.getElementById('leadId').value = l.id;
      document.getElementById('name').value = l.name;
      document.getElementById('contacted').value = l.contacted;
      document.getElementById('response').value = l.response;
      document.getElementById('phone').value = l.phone || '';
      document.getElementById('contactedOn').value = l.contactedOn || '';
      document.getElementById('followup').value = l.followup || '';
      document.getElementById('recurringType').value = l.recurringType || '';
      document.getElementById('recurringDate').value = l.recurringDate || '';
      document.getElementById('notes').value = l.notes || '';
      document.getElementById('modalHeader').innerText = "Update Lead Intelligence";
      document.getElementById('modalOverlay').classList.add('open');
    };

    document.getElementById('leadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('leadId').value;
      const data = {
        name: document.getElementById('name').value,
        contacted: document.getElementById('contacted').value,
        response: document.getElementById('response').value,
        phone: document.getElementById('phone').value,
        contactedOn: document.getElementById('contactedOn').value,
        followup: document.getElementById('followup').value,
        recurringType: document.getElementById('recurringType').value,
        recurringDate: document.getElementById('recurringDate').value,
        notes: document.getElementById('notes').value,
        deleted: false
      };

      if(id) await updateDoc(doc(db, "leads", id), data);
      else { data.createdAt = Date.now(); await addDoc(leadsRef, data); }
      closeModal();
    });

    lucide.createIcons();
  </script>
</body>
</html>
