<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TurboTech Pro | Premium CRM</title>
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --sidebar-bg: #0f172a;
      --body-bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.9);
      --border: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --glass: rgba(255, 255, 255, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--body-bg); 
      color: var(--text-main);
      display: flex;
      min-height: 100vh;
    }

    /* --- SIDEBAR --- */
    aside {
      width: 260px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 1000;
      transition: all 0.3s ease;
    }
    .sidebar-header { padding: 30px 24px; color: white; display: flex; align-items: center; gap: 12px; }
    .logo-box { background: var(--primary); padding: 8px; border-radius: 10px; }
    .nav-menu { flex: 1; padding: 10px 16px; }
    .nav-link { 
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
      color: #94a3b8; text-decoration: none; border-radius: 12px;
      margin-bottom: 8px; cursor: pointer; transition: 0.2s;
    }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
    .nav-link.active { background: var(--primary); color: white; }

    /* --- MAIN CONTENT --- */
    main { margin-left: 260px; flex: 1; padding: 30px; transition: all 0.3s ease; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
    .search-container { position: relative; flex: 1; max-width: 500px; }
    .search-container input { 
      width: 100%; padding: 12px 16px 12px 45px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--card-bg); outline: none;
    }
    .search-container i { position: absolute; left: 16px; top: 13px; color: var(--text-muted); }

    /* --- DASHBOARD STATS --- */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { 
      background: var(--card-bg); padding: 20px; border-radius: 16px; 
      border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      backdrop-filter: blur(10px);
    }
    .stat-card small { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
    .stat-card h2 { font-size: 1.8rem; margin-top: 8px; }

    /* --- DATA TABLE / CARDS --- */
    .data-container { 
      background: var(--card-bg); border-radius: 16px; 
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
    }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f1f5f9; padding: 16px; text-align: left; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
    td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
    .badge-yes { background: #dcfce7; color: #15803d; }
    .badge-no { background: #fee2e2; color: #b91c1c; }
    .badge-pending { background: #fef3c7; color: #b45309; }

    /* --- BUTTONS --- */
    .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; font-family: inherit; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-ghost { background: transparent; color: var(--text-muted); padding: 8px; }
    .btn-ghost:hover { background: #f1f5f9; color: var(--primary); }

    /* --- MODAL --- */
    .modal-overlay { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
      display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal { background: white; width: 100%; max-width: 600px; border-radius: 20px; padding: 30px; max-height: 90vh; overflow-y: auto; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    .form-group input, .form-group select, .form-group textarea { padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
    .full-width { grid-column: span 2; }

    /* --- MOBILE RESPONSIVE --- */
    #menuToggle { display: none; }

    @media (max-width: 1024px) {
      aside { transform: translateX(-100%); }
      aside.open { transform: translateX(0); }
      main { margin-left: 0; }
      #menuToggle { display: block; }
      
      /* Table to Cards */
      thead { display: none; }
      tr { display: block; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; padding: 10px; background: white; }
      td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 8px 12px; }
      td::before { content: attr(data-label); font-weight: 700; color: var(--text-muted); font-size: 0.8rem; }
      .actions-cell { justify-content: flex-end; border-top: 1px solid var(--border); margin-top: 8px; }
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Mobile Menu Toggle -->
  <button id="menuToggle" class="btn" style="position: fixed; top: 20px; left: 20px; z-index: 1100; background: var(--sidebar-bg); color: white;">
    <i data-lucide="menu"></i>
  </button>

  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo-box"><i data-lucide="zap"></i></div>
      <span style="font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px;">TurboTech</span>
    </div>
    <div class="nav-menu">
      <div class="nav-link active" onclick="setView('leads')">
        <i data-lucide="users"></i> <span>Leads Dashboard</span>
      </div>
      <div class="nav-link" onclick="setView('trash')">
        <i data-lucide="trash-2"></i> <span>Trash Recovery</span>
      </div>
      <div class="nav-link" onclick="alert('Settings feature coming soon!')">
        <i data-lucide="settings"></i> <span>Settings</span>
      </div>
    </div>
  </aside>

  <main>
    <div class="top-bar">
      <div class="search-container">
        <i data-lucide="search"></i>
        <input type="text" id="searchInput" placeholder="Search leads..." oninput="renderData()">
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <i data-lucide="plus"></i> Add New Lead
      </button>
    </div>

    <h1 id="viewTitle" style="margin-bottom: 20px;">Leads Dashboard</h1>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <small>Active Leads</small>
        <h2 id="countActive">0</h2>
      </div>
      <div class="stat-card">
        <small>Interested (Yes)</small>
        <h2 id="countYes" style="color: var(--accent);">0</h2>
      </div>
      <div class="stat-card">
        <small>In Trash</small>
        <h2 id="countTrash" style="color: var(--danger);">0</h2>
      </div>
    </div>

    <div class="data-container">
      <table>
        <thead>
          <tr>
            <th>Business Name</th>
            <th>Response</th>
            <th>Phone</th>
            <th>Follow-up</th>
            <th style="text-align: right;">Actions</th>
          </tr>
        </thead>
        <tbody id="dataTableBody">
          <!-- JS Rendered -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- FORM MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalHeader">New Outreach Entry</h2>
      <form id="leadForm">
        <input type="hidden" id="leadId">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Business / Institution Name</label>
            <input type="text" id="name" required placeholder="Name of salon, school, etc.">
          </div>
          <div class="form-group">
            <label>Contacted?</label>
            <select id="contacted">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </div>
          <div class="form-group">
            <label>Response Level</label>
            <select id="response">
              <option value="Pending">Pending</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+91...">
          </div>
          <div class="form-group">
            <label>Contacted On</label>
            <input type="date" id="contactedOn">
          </div>
          <div class="form-group">
            <label>Follow-up Date</label>
            <input type="date" id="followup">
          </div>
          <div class="form-group">
            <label>Recurring Service?</label>
            <select id="recurring">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </div>
          <div class="form-group">
            <label>Recurring Type</label>
            <input type="text" id="recurringType" placeholder="Monthly / Yearly">
          </div>
          <div class="form-group">
            <label>Recurring Date</label>
            <input type="date" id="recurringDate">
          </div>
          <div class="form-group full-width">
            <label>Notes</label>
            <textarea id="notes" rows="3" placeholder="Key details about the interaction..."></textarea>
          </div>
        </div>
        <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 12px;">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Intelligence</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDsM9-jrnVjV9x8vZF42ayIuMspf1nhEbs",
      authDomain: "turbotech-tracker.firebaseapp.com",
      projectId: "turbotech-tracker",
      storageBucket: "turbotech-tracker.firebasestorage.app",
      messagingSenderId: "563685474940",
      appId: "1:563685474940:web:61b8278c8e70b7286dbff9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const leadsRef = collection(db, "leads");

    let leads = [];
    let currentView = 'leads'; // 'leads' or 'trash'

    // --- REAL-TIME SYNC ---
    const q = query(leadsRef, orderBy("name", "asc"));
    onSnapshot(q, (snapshot) => {
      leads = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      
      // Automatic Trash Cleanup (15 days)
      if (currentView === 'trash') purgeOldTrash();
      
      renderData();
    });

    // --- RENDER LOGIC ---
    window.renderData = function() {
      const tbody = document.getElementById('dataTableBody');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = leads.filter(l => {
        const isDeleted = l.deleted === true;
        const matchesSearch = l.name.toLowerCase().includes(searchTerm) || (l.phone && l.phone.includes(searchTerm));
        
        if (currentView === 'leads') return !isDeleted && matchesSearch;
        if (currentView === 'trash') return isDeleted && matchesSearch;
      });

      tbody.innerHTML = filtered.map(l => `
        <tr>
          <td data-label="Business">${l.name}</td>
          <td data-label="Status"><span class="badge badge-${l.response.toLowerCase()}">${l.response}</span></td>
          <td data-label="Phone">${l.phone || '—'}</td>
          <td data-label="Follow-up">${l.followup || '—'}</td>
          <td class="actions-cell">
            ${currentView === 'leads' ? `
              <button class="btn btn-ghost" onclick="editLead('${l.id}')"><i data-lucide="edit-3"></i></button>
              <button class="btn btn-ghost" style="color:var(--danger)" onclick="softDelete('${l.id}')"><i data-lucide="trash-2"></i></button>
            ` : `
              <button class="btn btn-ghost" style="color:var(--accent)" onclick="restoreLead('${l.id}')"><i data-lucide="rotate-ccw"></i> Restore</button>
            `}
          </td>
        </tr>
      `).join('');

      updateStats();
      lucide.createIcons();
    }

    function updateStats() {
      const active = leads.filter(l => !l.deleted);
      document.getElementById('countActive').innerText = active.length;
      document.getElementById('countYes').innerText = active.filter(l => l.response === 'Yes').length;
      document.getElementById('countTrash').innerText = leads.filter(l => l.deleted).length;
    }

    // --- TRASH SYSTEM LOGIC ---
    window.softDelete = async function(id) {
      if(confirm("Move this lead to trash?")) {
        await updateDoc(doc(db, "leads", id), { 
          deleted: true, 
          deletedAt: Date.now() 
        });
      }
    }

    window.restoreLead = async function(id) {
      await updateDoc(doc(db, "leads", id), { 
        deleted: false, 
        deletedAt: null 
      });
    }

    async function purgeOldTrash() {
      const fifteenDaysMs = 15 * 24 * 60 * 60 * 1000;
      const now = Date.now();
      
      const toDelete = leads.filter(l => l.deleted && (now - l.deletedAt) > fifteenDaysMs);
      
      for (const lead of toDelete) {
        await deleteDoc(doc(db, "leads", lead.id));
      }
    }

    // --- VIEW NAVIGATION ---
    window.setView = function(view) {
      currentView = view;
      document.getElementById('viewTitle').innerText = view === 'leads' ? 'Leads Dashboard' : 'Trash Recovery';
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      event.currentTarget.classList.add('active');
      
      // Hide stats if in trash view for cleaner look
      document.getElementById('statsGrid').style.display = view === 'trash' ? 'none' : 'grid';
      
      // Close mobile sidebar on navigate
      document.getElementById('sidebar').classList.remove('open');
      
      renderData();
    }

    // --- MODAL & FORM LOGIC ---
    window.openModal = function() {
      document.getElementById('leadForm').reset();
      document.getElementById('leadId').value = '';
      document.getElementById('modalHeader').innerText = "New Outreach Entry";
      document.getElementById('modalOverlay').classList.add('open');
    }

    window.closeModal = function() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    window.editLead = function(id) {
      const l = leads.find(lead => lead.id === id);
      document.getElementById('leadId').value = l.id;
      document.getElementById('name').value = l.name;
      document.getElementById('contacted').value = l.contacted;
      document.getElementById('response').value = l.response;
      document.getElementById('phone').value = l.phone || '';
      document.getElementById('contactedOn').value = l.contactedOn || '';
      document.getElementById('followup').value = l.followup || '';
      document.getElementById('recurring').value = l.recurring;
      document.getElementById('recurringType').value = l.recurringType || '';
      document.getElementById('recurringDate').value = l.recurringDate || '';
      document.getElementById('notes').value = l.notes || '';
      
      document.getElementById('modalHeader').innerText = "Edit Intelligence";
      document.getElementById('modalOverlay').classList.add('open');
    }

    document.getElementById('leadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('leadId').value;
      
      const data = {
        name: document.getElementById('name').value,
        contacted: document.getElementById('contacted').value,
        response: document.getElementById('response').value,
        phone: document.getElementById('phone').value,
        contactedOn: document.getElementById('contactedOn').value,
        followup: document.getElementById('followup').value,
        recurring: document.getElementById('recurring').value,
        recurringType: document.getElementById('recurringType').value,
        recurringDate: document.getElementById('recurringDate').value,
        notes: document.getElementById('notes').value,
        deleted: false // Default
      };

      if (id) {
        await updateDoc(doc(db, "leads", id), data);
      } else {
        data.createdAt = Date.now();
        await addDoc(leadsRef, data);
      }
      closeModal();
    });

    // --- MOBILE UI INTERACTION ---
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    lucide.createIcons();
  </script>
</body>
</html>
